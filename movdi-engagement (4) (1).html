<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVDI — Engagement Rate</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #fe6400; --dark: #181818; --dark2: #222; --dark3: #2c2c2c;
  --border: #383838; --text: #fefefa; --muted: #888;
  --green: #00c875; --yellow: #f5bd47; --red: #ff4444; --blue: #4a9eff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: 'Roboto', sans-serif; min-height: 100vh; }

#login-overlay { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 999; }
.login-box { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 44px 48px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.login-logo { width: 90px; margin-bottom: 24px; }
.login-box h2 { font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }
.login-box input[type=password] { width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Roboto', sans-serif; font-size: 15px; padding: 13px 16px; outline: none; text-align: center; letter-spacing: 3px; margin-bottom: 16px; transition: border-color 0.2s; }
.login-box input[type=password]:focus { border-color: var(--orange); }
.login-btn { width: 100%; background: var(--orange); color: white; border: none; border-radius: 6px; font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 13px; cursor: pointer; }
.login-btn:hover { background: #e55a00; }
.login-error { color: #ff5555; font-size: 12px; margin-top: 10px; display: none; }
.login-error.show { display: block; }

#app { display: none; }
.header { background: #111; border-bottom: 3px solid var(--orange); padding: 13px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.5); }
.logo-img { height: 40px; }
.header-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; border-left: 1px solid var(--border); padding-left: 16px; }
.container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

.talent-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.talent-toprow { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.talent-name-input { flex: 1; min-width: 200px; background: transparent; border: none; border-bottom: 2px solid var(--border); color: var(--text); font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; padding: 4px 0; outline: none; transition: border-color 0.2s; }
.talent-name-input:focus { border-color: var(--orange); }
.talent-name-input::placeholder { color: var(--muted); font-weight: 400; letter-spacing: 1px; text-transform: none; font-size: 14px; }
.remove-talent-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; }
.remove-talent-btn:hover { border-color: var(--red); color: var(--red); }

.platform-tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
.ptab { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.15s; }
.ptab.active { color: white; border-color: transparent; }
.ptab[data-p="ig"].active { background: linear-gradient(135deg,#e1306c,#f77737); }
.ptab[data-p="tt"].active { background: #111; border-color: #69c9d0; color: #69c9d0; }
.ptab[data-p="yt"].active { background: #ff0000; }
.ptab[data-p="tw"].active { background: #9146ff; }
.ptab[data-p="x"].active  { background: #333; border-color: #ccc; color: #ccc; }

.semi-auto-box { background: rgba(254,100,0,0.06); border: 1px dashed rgba(254,100,0,0.3); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.semi-auto-box label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); white-space: nowrap; }
.link-input { flex: 1; min-width: 200px; background: var(--dark3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Roboto', sans-serif; font-size: 13px; padding: 9px 12px; outline: none; transition: border-color 0.2s; }
.link-input:focus { border-color: var(--orange); }
.link-input::placeholder { color: #555; }
.open-btn { background: var(--orange); color: white; border: none; border-radius: 6px; padding: 9px 16px; font-family: 'Roboto', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
.open-btn:hover { background: #e55a00; }

.hint-box { background: rgba(74,158,255,0.07); border-left: 3px solid rgba(74,158,255,0.4); border-radius: 0 6px 6px 0; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #7ab8ff; line-height: 1.6; }
.hint-box a { color: #9146ff; }

/* KEY CHANGE: fields-grid uses static DOM, never re-rendered */
.fields-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 12px; margin-bottom: 16px; }
.field-group label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.field-group input {
  width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: 'Roboto Mono', monospace; font-size: 15px;
  padding: 10px 12px; outline: none; transition: border-color 0.2s;
  /* No type=number → no spinners ever */
}
.field-group input:focus { border-color: var(--orange); }
.field-group input::placeholder { color: #444; font-size: 12px; }

.result-box { background: var(--dark3); border-radius: 8px; padding: 16px 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; border: 1px solid var(--border); margin-top: 14px; }
.er-big { font-family: 'Roboto Mono', monospace; font-size: 38px; font-weight: 900; line-height: 1; }
.er-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.er-meta { font-size: 11px; color: var(--muted); margin-top: 5px; font-style: italic; }
.benchmark-bar-wrap { flex: 1; min-width: 200px; }
.bbar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 8px 0; }
.bbar-fill { height: 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(0.16,1,0.3,1); }
.bbar-zones { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); }
.verdict-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; }
.v-excelente { background: rgba(0,200,117,0.15); color: var(--green); border: 1px solid rgba(0,200,117,0.3); }
.v-bueno     { background: rgba(0,200,117,0.08); color: #7ee8b8; border: 1px solid rgba(0,200,117,0.18); }
.v-promedio  { background: rgba(245,189,71,0.12); color: var(--yellow); border: 1px solid rgba(245,189,71,0.25); }
.v-bajo      { background: rgba(255,68,68,0.1); color: var(--red); border: 1px solid rgba(255,68,68,0.2); }

.btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: 6px; font-family: 'Roboto', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background: var(--orange); color: white; }
.btn-primary:hover { background: #e55a00; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(254,100,0,0.35); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
.actions-row { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }

#report-section { margin-top: 32px; }
.report-title { font-size: 11px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: var(--orange); margin-bottom: 20px; }
.report-talent { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.report-talent-header { background: var(--dark3); padding: 13px 20px; border-bottom: 1px solid var(--border); }
.report-talent-name { font-size: 13px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); }
.report-platforms { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
.rpc { padding: 14px 18px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.rpc-plat { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.rpc-er { font-family: 'Roboto Mono', monospace; font-size: 26px; font-weight: 900; line-height: 1; }
.plat-ig{color:#e1306c} .plat-tt{color:#69c9d0} .plat-yt{color:#ff4444} .plat-tw{color:#9146ff} .plat-x{color:#ccc}

@media(max-width:600px){.container{padding:16px}.fields-grid{grid-template-columns:1fr 1fr}.header{padding:12px 16px}}
</style>
</head>

// ── NUMBER HELPERS ──
// Parse "1.2M", "80K", "1,200,000" → number. Only called on blur, never while typing.
function parseSmart(v) {
  if (v === '' || v === null || v === undefined) return '';
  const s = String(v).trim().replace(/,/g, '').replace(/\s/g, '').toLowerCase();
  if (!s) return '';
  const num = parseFloat(s);
  if (isNaN(num)) return '';
  if (s.endsWith('m')) return Math.round(num * 1e6);
  if (s.endsWith('k')) return Math.round(num * 1e3);
  // Plain integer or decimal — only if no letters
  if (/^\d+(\.\d+)?$/.test(s)) return Math.round(num);
  return '';
}

    fStr: 'Viewers promedio / Seguidores',
  },
  x: {
    label: 'X / Twitter', shortLabel: 'X', color: '#ccc',
    urlTemplate: h => 'https://x.com/' + h.replace('@',''),
    hint: '<strong>¿Cómo obtener los datos?</strong><br>1. Abre el perfil → anota <strong>seguidores</strong><br>2. Promedia los últimos 10-15 tweets:<br><strong>likes, reposts y replies</strong>',
    zones: [{l:'Bajo',max:0.5,c:'#ff4444'},{l:'Promedio',max:1,c:'#f5bd47'},{l:'Bueno',max:3,c:'#7ee8b8'},{l:'Excelente',max:Infinity,c:'#00c875'}],
    fields: [{key:'followers',label:'Seguidores'},{key:'avg_likes',label:'Likes prom.'},{key:'avg_reposts',label:'Reposts prom.'},{key:'avg_replies',label:'Replies prom.'}],
    formula: d => d.followers>0 ? ((d.avg_likes+d.avg_reposts+d.avg_replies)/d.followers)*100 : null,
    fStr: '(Likes + Reposts + Replies) / Seguidores',
  },
};
const PLATFORMS = ['ig','tt','yt','tw','x'];

// ── STATE ──
let talentCount = 0;
// talentData[id] = { name, activePlatform, links:{}, platforms:{ig:{followers:0,...}, ...} }
let talentData = {};

function getVerdict(er, zones) { return zones.find(z => er < z.max) || zones[zones.length-1]; }
function fmtER(n) { return (n===null||isNaN(n)) ? '—' : n.toFixed(2)+'%'; }

// ── ADD / REMOVE TALENT ──
function addTalent() {
  talentCount++;
  const id = 't' + talentCount;
  talentData[id] = { name:'', activePlatform:'ig', links:{}, platforms:{} };
  PLATFORMS.forEach(p => {
    talentData[id].links[p] = '';
    talentData[id].platforms[p] = {};
    BENCHMARKS[p].fields.forEach(f => { talentData[id].platforms[p][f.key] = 0; });
  });

  const wrap = document.createElement('div');
  wrap.id = id;
  wrap.innerHTML = buildCardHTML(id);
  document.getElementById('talents-container').appendChild(wrap);
  bindCardEvents(id);
}

function removeTalent(id) {
  document.getElementById(id)?.remove();
  delete talentData[id];
}

// ── BUILD CARD HTML (called once per talent) ──
function buildCardHTML(id) {
  const td = talentData[id];
  const tabs = PLATFORMS.map(p =>
    `<button class="ptab${p==='ig'?' active':''}" data-p="${p}" id="${id}-tab-${p}"
      onclick="switchPlatform('${id}','${p}')">${BENCHMARKS[p].shortLabel}</button>`
  ).join('');

  const panels = PLATFORMS.map(p => {
    const bench = BENCHMARKS[p];
    const fields = bench.fields.map(f =>
      `<div class="field-group">
        <label>${f.label}</label>
        <input type="text" inputmode="decimal" id="${id}-${p}-${f.key}"
          placeholder="ej. 1.2M, 500K"
          onblur="saveField('${id}','${p}','${f.key}',this.value); updateResult('${id}')">
      </div>`
    ).join('');
    return `<div class="platform-panel" id="${id}-panel-${p}" style="display:${p==='ig'?'block':'none'}">
      <div class="semi-auto-box">
        <label>🔗 Abrir perfil</label>
        <input class="link-input" type="text" id="${id}-link-${p}"
          placeholder="${p==='yt'?'@canal o URL':'@handle o URL'}">
        <button class="open-btn" onclick="openProfile('${id}','${p}')">Abrir ↗</button>
      </div>
      <div class="hint-box">${bench.hint}</div>
      <div class="fields-grid">${fields}</div>
    </div>`;
  }).join('');

  return `<div class="talent-card">
    <div class="talent-toprow">
      <input class="talent-name-input" type="text" placeholder="Nombre del talento"
        id="${id}-name" oninput="talentData['${id}'].name=this.value">
      <button class="remove-talent-btn" onclick="removeTalent('${id}')">✕ Eliminar</button>
    </div>
    <div class="platform-tabs">${tabs}</div>
    ${panels}
    <div id="${id}-result"></div>
  </div>`;
}

function bindCardEvents(id) {
  // nothing extra needed — all via inline handlers
}

// ── PLATFORM SWITCH (just show/hide panels, no re-render) ──
function switchPlatform(id, p) {
  PLATFORMS.forEach(pp => {
    document.getElementById(`${id}-panel-${pp}`).style.display = pp===p ? 'block' : 'none';
    document.getElementById(`${id}-tab-${pp}`).classList.toggle('active', pp===p);
  });
  updateResult(id, p);
}

// ── SAVE FIELD (on blur) ──
function saveField(id, p, key, raw) {
  const val = parseSmart(raw);
  talentData[id].platforms[p][key] = (val === '' || val === null) ? 0 : +val;
  // Format back nicely on blur
  const input = document.getElementById(`${id}-${p}-${key}`);
  if (input && val !== '' && val > 0) {
    input.value = formatDisplay(val);
  }
}

function formatDisplay(n) {
  if (!n && n !== 0) return '';
  n = Number(n);
  if (n >= 1e6) {
    const v = n / 1e6;
    return (Number.isInteger(v) ? v.toString() : v.toFixed(2).replace(/\.?0+$/, '')) + 'M';
  }
  if (n >= 10000) {
    const v = n / 1e3;
    return (Number.isInteger(v) ? v.toString() : v.toFixed(1).replace(/\.?0+$/, '')) + 'K';
  }
  return n.toLocaleString('es-MX');
}

// ── UPDATE RESULT ──
function updateResult(id, activePlatform) {
  const ap = activePlatform || talentData[id]._activePlatform || 'ig';
  talentData[id]._activePlatform = ap;
  const bench = BENCHMARKS[ap];
  const d = talentData[id].platforms[ap];
  const er = bench.formula(d);
  const el = document.getElementById(`${id}-result`);
  if (!el) return;

  if (er === null || isNaN(er) || er < 0) { el.innerHTML = ''; return; }

  const verdict = getVerdict(er, bench.zones);
  const maxRef = bench.zones[bench.zones.length-2].max;
  const barPct = Math.min(er / (maxRef * 1.6) * 100, 100);
  const vKey = {Bajo:'bajo',Promedio:'promedio',Bueno:'bueno',Excelente:'excelente'}[verdict.l] || 'promedio';

  el.innerHTML = `<div class="result-box">
    <div>
      <div class="er-label">Engagement Rate</div>
      <div class="er-big" style="color:${verdict.c}">${fmtER(er)}</div>
      <span class="verdict-badge v-${vKey}">${verdict.l}</span>
      <div class="er-meta">${bench.fStr}</div>
    </div>
    <div class="benchmark-bar-wrap">
      <div class="er-label">Benchmark ${bench.label}</div>
      <div class="bbar-track"><div class="bbar-fill" style="width:${barPct}%;background:${verdict.c}"></div></div>
      <div class="bbar-zones">
        ${bench.zones.filter(z=>z.max!==Infinity).map(z=>`<span style="color:${z.c}">${z.max}%</span>`).join('')}
        <span>+</span>
      </div>
      <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
        ${bench.zones.map(z=>`<span style="font-size:10px;color:${z.c}">● ${z.l}${z.max!==Infinity?' (<'+z.max+'%)':''}</span>`).join('')}
      </div>
    </div>
  </div>`;
}

// ── OPEN PROFILE ──
function openProfile(id, p) {
  const raw = (document.getElementById(`${id}-link-${p}`)?.value || '').trim();
  if (!raw) { alert('Ingresa un handle o URL primero'); return; }
  const bench = BENCHMARKS[p];
  const url = raw.startsWith('http') ? raw : bench.urlTemplate(raw);
  window.open(url, '_blank');
}

// ── REPORT ──
function calcAll() {
  const report = document.getElementById('report-section');
  let html = '<div class="report-title">📊 Reporte de Engagement</div>';
  let hasAny = false;

  Object.entries(talentData).forEach(([id, td]) => {
    const name = td.name || '(Sin nombre)';
    let cells = '', count = 0;
    PLATFORMS.forEach(p => {
      const bench = BENCHMARKS[p];
      const er = bench.formula(td.platforms[p]);
      if (er === null || isNaN(er) || er < 0) return;
      count++;
      const verdict = getVerdict(er, bench.zones);
      const vKey = {Bajo:'bajo',Promedio:'promedio',Bueno:'bueno',Excelente:'excelente'}[verdict.l]||'promedio';
      cells += `<div class="rpc">
        <div class="rpc-plat plat-${p}">${bench.label}</div>
        <div class="rpc-er" style="color:${verdict.c}">${fmtER(er)}</div>
        <div style="margin-top:6px"><span class="verdict-badge v-${vKey}" style="font-size:9px;padding:2px 8px">${verdict.l}</span></div>
      </div>`;
    });
    if (!count) return;
    hasAny = true;
    html += `<div class="report-talent">
      <div class="report-talent-header"><span class="report-talent-name">${name}</span></div>
      <div class="report-platforms">${cells}</div>
    </div>`;
  });

  if (!hasAny) { alert('Ingresa datos en al menos una plataforma'); return; }
  report.innerHTML = html;
  report.style.display = 'block';
  report.scrollIntoView({ behavior:'smooth', block:'start' });
}

function resetAll() {
  if (!confirm('¿Limpiar todo?')) return;
  talentData = {}; talentCount = 0;
  document.getElementById('talents-container').innerHTML = '';
  document.getElementById('report-section').style.display = 'none';
  addTalent();
}
</script>
</body>
</html>
