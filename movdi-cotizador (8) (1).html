<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVDI — Cotizador</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --orange: #fe6400;
    --dark: #202020;
    --dark2: #282828;
    --dark3: #333;
    --border: #3d3d3d;
    --text: #fefefa;
    --muted: #909090;
    --success: #00ad68;
    --orange-dim: rgba(254,100,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Roboto', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-overlay { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 999; }
  .login-box { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 44px 48px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .login-logo { width: 90px; margin-bottom: 24px; }
  .login-box h2 { font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }
  .login-box input[type=password] { width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Roboto', sans-serif; font-size: 15px; padding: 13px 16px; outline: none; text-align: center; letter-spacing: 3px; margin-bottom: 16px; transition: border-color 0.2s; }
  .login-box input[type=password]:focus { border-color: var(--orange); }
  .login-btn { width: 100%; background: var(--orange); color: white; border: none; border-radius: 6px; font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 13px; cursor: pointer; transition: all 0.2s; }
  .login-btn:hover { background: #e55a00; }
  .login-error { color: #ff5555; font-size: 12px; margin-top: 10px; display: none; }
  .login-error.show { display: block; }

  /* APP */
  #app { display: none; }
  .header { background: #181818; border-bottom: 3px solid var(--orange); padding: 13px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.5); }
  .logo-img { height: 42px; width: auto; }
  .header-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; border-left: 1px solid var(--border); padding-left: 16px; margin-left: 4px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  /* CARDS */
  .card { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 12px; font-weight: 900; letter-spacing: 3px; margin-bottom: 18px; color: var(--text); display: flex; align-items: center; gap: 12px; text-transform: uppercase; }
  .step-badge { background: var(--orange); color: white; font-size: 10px; padding: 3px 9px; border-radius: 3px; font-weight: 700; letter-spacing: 1px; }

  /* FORM */
  .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 200px; }
  .form-group label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .form-group input, .note-input { width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Roboto', sans-serif; font-size: 14px; padding: 11px 14px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus, .note-input:focus { border-color: var(--orange); }
  .note-input { min-height: 60px; resize: vertical; }

  /* TALENT SEARCH */
  .talent-search-wrap { position: relative; }
  .talent-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--dark3); border: 1px solid var(--orange); border-radius: 8px; max-height: 260px; overflow-y: auto; z-index: 50; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .talent-dropdown.show { display: block; }
  .talent-option { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; border-bottom: 1px solid var(--border); }
  .talent-option:last-child { border-bottom: none; }
  .talent-option:hover { background: var(--orange-dim); }
  .talent-option .t-name { font-weight: 600; font-size: 14px; }
  .talent-option .t-followers { font-size: 11px; color: var(--muted); }
  .selected-talents { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .talent-chip { background: var(--dark3); border: 1px solid var(--orange); border-radius: 4px; padding: 7px 14px 7px 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.15s; text-transform: uppercase; letter-spacing: 1px; }
  .talent-chip:hover { background: var(--orange-dim); }
  .talent-chip .chip-remove { color: var(--orange); font-size: 16px; line-height: 1; }

  /* TALENT SECTION */
  .talent-section-header { background: var(--dark3); border-left: 3px solid var(--orange); padding: 10px 16px; border-radius: 0 6px 6px 0; margin: 16px 0 8px; display: flex; align-items: center; justify-content: space-between; }
  .t-hname { font-size: 13px; font-weight: 900; color: var(--orange); letter-spacing: 3px; text-transform: uppercase; }
  .t-hfollowers { font-size: 11px; color: var(--muted); }

  /* TABLE */
  .actions-table { width: 100%; border-collapse: collapse; }
  .actions-table th { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .actions-table td { padding: 8px 12px; border-bottom: 1px solid rgba(61,61,61,0.5); vertical-align: middle; }
  .actions-table tr:last-child td { border-bottom: none; }
  .actions-table tr:hover td { background: rgba(254,100,0,0.03); }

  /* INPUTS */
  .qty-input { width: 68px; background: var(--dark); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: 'Roboto', sans-serif; font-size: 13px; padding: 7px 10px; text-align: center; outline: none; }
  .qty-input:focus { border-color: var(--orange); }
  .price-input { width: 130px; background: var(--dark); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: 'Roboto', sans-serif; font-size: 13px; padding: 7px 10px; text-align: right; outline: none; }
  .price-input:focus { border-color: var(--success); }
  .price-input.preloaded { border-color: rgba(0,173,104,0.4); color: #4dd9a0; }
  .line-total { font-weight: 700; font-size: 14px; text-align: right; color: var(--text); min-width: 120px; }

  /* PLATFORM TAGS */
  .action-label { font-size: 13px; font-weight: 500; }
  .platform-tag { font-size: 9px; padding: 2px 7px; border-radius: 3px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-left: 6px; }
  .ig  { background: rgba(225,48,108,0.15); color: #e1306c; }
  .tt  { background: rgba(0,0,0,0.3); color: #69c9d0; border: 1px solid #69c9d0; }
  .yt  { background: rgba(255,0,0,0.12); color: #ff4444; }
  .tw  { background: rgba(100,65,164,0.2); color: #9146ff; }
  .fb  { background: rgba(24,119,242,0.15); color: #1877f2; }
  .x   { background: rgba(255,255,255,0.08); color: #ddd; border: 1px solid #555; }
  .kk  { background: rgba(83,252,91,0.1); color: #53fc5b; }
  .gen { background: rgba(254,100,0,0.15); color: var(--orange); }

  /* ADD ACTION — grouped select */
  .add-action-row { display: flex; gap: 12px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .add-action-row select { flex: 1; min-width: 240px; background: var(--dark3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Roboto', sans-serif; font-size: 13px; padding: 10px 12px; outline: none; }
  .add-action-row select:focus { border-color: var(--orange); }
  .add-action-row select optgroup { color: var(--orange); font-size: 11px; letter-spacing: 1px; }
  .add-action-row select option { color: var(--text); background: var(--dark3); }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: 6px; font-family: 'Roboto', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:hover { background: #e55a00; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(254,100,0,0.35); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #009959; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,173,104,0.35); }
  .btn-sm { padding: 7px 14px; font-size: 11px; }
  .remove-action-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
  .remove-action-btn:hover { color: var(--orange); background: var(--orange-dim); }

  /* TOTALS */
  .totals-card { background: #181818; border: 2px solid var(--orange); border-radius: 10px; padding: 24px; position: sticky; bottom: 20px; box-shadow: 0 8px 32px rgba(254,100,0,0.15); }
  .totals-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; }
  .totals-row.total-big { border-top: 1px solid var(--orange); margin-top: 8px; padding-top: 14px; }
  .totals-row label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
  .totals-row .amount { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
  .totals-row.total-big .amount { font-size: 30px; color: var(--orange); }
  .actions-bar { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 36px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }
  .collab-note { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; }

  /* UDI Package Selector */
  .udi-selector-wrap {
    background: rgba(254,100,0,0.07);
    border: 1px solid rgba(254,100,0,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .udi-selector-label {
    font-size: 11px; font-weight: 900; letter-spacing: 2px;
    text-transform: uppercase; color: var(--orange); white-space: nowrap;
  }
  .udi-months-input {
    width: 80px; background: var(--dark); border: 1px solid var(--orange);
    border-radius: 6px; color: var(--text); font-family: 'Roboto', sans-serif;
    font-size: 15px; font-weight: 700; padding: 8px 10px; text-align: center; outline: none;
  }
  .udi-info {
    flex: 1; min-width: 160px;
  }
  .udi-price-line {
    font-size: 13px; color: var(--text); font-weight: 500;
  }
  .udi-discount-badge {
    display: inline-block; font-size: 10px; font-weight: 900; letter-spacing: 1px;
    background: var(--success); color: white; padding: 2px 8px; border-radius: 3px;
    margin-left: 8px; text-transform: uppercase;
  }
  .udi-total-line {
    font-size: 16px; font-weight: 900; color: var(--orange); margin-top: 2px;
  }
  .udi-savings-line {
    font-size: 11px; color: var(--success); margin-top: 1px;
  }
  .udi-remove-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 5px; padding: 6px 10px; cursor: pointer; font-size: 12px;
    transition: all 0.15s;
  }
  .udi-remove-btn:hover { border-color: var(--orange); color: var(--orange); }

  /* UDI / Exclusividad rows */
  tr.udi-row td { background: rgba(254,100,0,0.06); border-bottom: 1px solid rgba(254,100,0,0.15) !important; }
  tr.udi-row:hover td { background: rgba(254,100,0,0.11) !important; }
  .udi-badge {
    display: inline-block; font-size: 9px; font-weight: 900; letter-spacing: 1.5px;
    text-transform: uppercase; background: var(--orange); color: white;
    padding: 2px 7px; border-radius: 3px; margin-right: 7px; vertical-align: middle;
  }
  .udi-label { font-size: 13px; font-weight: 700; vertical-align: middle; }

  /* UDI discount summary row */
  .udi-discount-row td {
    background: rgba(0,173,104,0.08) !important;
    border-top: 1px dashed rgba(0,173,104,0.35) !important;
    border-bottom: 1px dashed rgba(0,173,104,0.35) !important;
    padding: 7px 12px;
  }
  .discount-label { font-size: 12px; font-weight: 700; color: var(--success); letter-spacing: 0.5px; }
  .discount-amount { font-size: 14px; font-weight: 700; color: var(--success); }
  .talent-subtotal-row td {
    background: rgba(254,100,0,0.06) !important;
    border-top: 2px solid rgba(254,100,0,0.3) !important;
    padding: 8px 12px;
  }
  .talent-subtotal-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .talent-subtotal-amount { font-size: 15px; font-weight: 900; color: var(--orange); }

  /* PDF OVERLAY */
  #pdf-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  #pdf-overlay.show { display: flex; }
  .pdf-modal { background: white; border-radius: 8px; max-width: 820px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .pdf-modal-header { background: #181818; padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; border-bottom: 2px solid var(--orange); }
  .pdf-modal-header h3 { color: white; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }

  /* PDF TEMPLATE */
  #pdf-content { background: white; color: #1a1a1a; padding: 44px; font-family: 'Roboto', sans-serif; }
  .pdf-logo-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 36px; padding-bottom: 20px; border-bottom: 3px solid #fe6400; }
  .pdf-logo-img { height: 60px; width: auto; }
  .pdf-meta { text-align: right; }
  .pdf-meta .pdf-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fe6400; margin-bottom: 2px; }
  .pdf-meta .pdf-value { font-size: 18px; font-weight: 700; color: #1a1a1a; }
  .pdf-talent-block { margin-bottom: 22px; border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; }
  .pdf-talent-header { background: #fe6400; color: white; padding: 11px 16px; display: flex; justify-content: space-between; align-items: center; }
  .pdf-talent-header .t-name { font-size: 14px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
  .pdf-talent-header .t-followers { font-size: 11px; opacity: 0.85; }
  .pdf-actions-table { width: 100%; border-collapse: collapse; }
  .pdf-actions-table th { background: #f8f8f8; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #666; padding: 9px 14px; text-align: left; border-bottom: 1px solid #e5e5e5; }
  .pdf-actions-table th:nth-child(3), .pdf-actions-table th:last-child { text-align: right; }
  .pdf-actions-table td { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .pdf-actions-table td:nth-child(3), .pdf-actions-table td:last-child { text-align: right; font-weight: 600; }
  .pdf-subtotal-row { background: #fafafa; padding: 9px 14px; display: flex; justify-content: space-between; font-size: 13px; color: #555; border-top: 1px solid #e5e5e5; }
  .pdf-total-section { margin-top: 22px; padding: 20px; background: #fff5f0; border: 2px solid #fe6400; border-radius: 8px; }
  .pdf-total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
  .pdf-total-row.grand { border-top: 2px solid #fe6400; margin-top: 8px; padding-top: 14px; font-size: 22px; font-weight: 900; color: #fe6400; letter-spacing: 1px; }
  .pdf-footer { margin-top: 28px; padding-top: 14px; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: flex-end; font-size: 11px; color: #aaa; }
  .pdf-footer .pdf-facturation { font-size: 12px; color: #555; font-weight: 700; }
  .pdf-confidential { font-style: italic; max-width: 360px; text-align: right; line-height: 1.4; }
  .pdf-note-section { background: #f9f9f9; border-left: 3px solid #fe6400; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #444; border-radius: 0 6px 6px 0; }
  .reel-collab-badge { font-size: 10px; background: #fff5f0; color: #fe6400; border: 1px solid #fe6400; padding: 2px 6px; border-radius: 3px; margin-left: 6px; font-weight: 700; }

  @media (max-width: 600px) { .container { padding: 16px; } .form-row { flex-direction: column; } .actions-table { font-size: 12px; } .header { padding: 12px 16px; } }
</style>
</head>

// Build grouped options for select
function buildActionSelect(talentName) {
  const groups = {};
  ACTION_CATALOG.forEach(a => {
    if (!groups[a.group]) groups[a.group] = [];
    groups[a.group].push(a);
  });
  let html = '<option value="">— Agregar acción —</option>';
  Object.entries(groups).forEach(([g, actions]) => {
    html += `<optgroup label="${g}">`;
    actions.forEach(a => { html += `<option value="${a.key}">${a.label}</option>`; });
    html += '</optgroup>';
  });
  return html;
}

let selectedTalents = [], talentActions = {}, udiMonths = {};

// UDI helpers
function getUDIDiscount(months) {
  if (months >= 12) return 0.30;
  if (months >= 6)  return 0.20;
  if (months >= 3)  return 0.10;
  return 0;
}
function getUDITotal(talentName, months) {
  const t = TALENTS.find(x => x.name === talentName);
  if (!t || !months || months < 1) return { base: 0, discount: 0, total: 0, savings: 0 };
  const unitPrice = t.prices['uso_imagen_mes'] || 0;
  const base = unitPrice * months;
  const pct = getUDIDiscount(months);
  const savings = Math.round(base * pct);
  return { base, discount: pct, total: base - savings, savings, unitPrice };
}

function filterTalents() {
  const q = document.getElementById('talent-search').value.toLowerCase();
  const dd = document.getElementById('talent-dropdown');
  const filtered = TALENTS.filter(t => t.name.toLowerCase().includes(q) && !selectedTalents.find(s=>s.name===t.name));
  dd.innerHTML = '';
  if (!q) { dd.classList.remove('show'); return; }
  filtered.slice(0,12).forEach(t => {
    const div = document.createElement('div'); div.className = 'talent-option';
    const fw = [t.ig_followers&&'IG: '+t.ig_followers, t.tiktok_followers&&'TT: '+t.tiktok_followers.trim()].filter(Boolean).join(' · ');
    div.innerHTML = `<span class="t-name">${t.name}</span><span class="t-followers">${fw}</span>`;
    div.onmousedown = () => addTalent(t); dd.appendChild(div);
  });
  dd.classList.toggle('show', filtered.length > 0 && q.length > 0);
}
function showDropdown() { filterTalents(); }
function hideDropdown() { document.getElementById('talent-dropdown').classList.remove('show'); }

function addTalent(t) {
  selectedTalents.push(t); talentActions[t.name] = []; udiMonths[t.name] = 0;
  document.getElementById('talent-search').value = '';
  document.getElementById('talent-dropdown').classList.remove('show');
  renderSelectedTalents(); renderActionsSection(); recalcTotals();
}
function removeTalent(name) {
  selectedTalents = selectedTalents.filter(t=>t.name!==name); delete talentActions[name]; delete udiMonths[name];
  renderSelectedTalents(); renderActionsSection(); recalcTotals();
}
function renderSelectedTalents() {
  document.getElementById('selected-talents').innerHTML = selectedTalents.map(t =>
    `<div class="talent-chip" onclick="removeTalent('${t.name.replace(/'/g,"\'")}')"><span>${t.name}</span><span class="chip-remove">×</span></div>`
  ).join('');
}
function slugify(n) { return n.replace(/[^a-zA-Z0-9]/g,'_'); }

const PLATFORM_LABELS = { ig:'Instagram', tt:'TikTok', yt:'YouTube', tw:'Twitch', fb:'Facebook', x:'X / Twitter', kk:'Kick', gen:'General' };

function renderActionsSection() {
  const sec = document.getElementById('actions-section');
  const tc = document.getElementById('totals-card');
  if (!selectedTalents.length) { sec.innerHTML=''; tc.style.display='none'; return; }
  tc.style.display='block';
  sec.innerHTML = selectedTalents.map(t => {
    const fw = [t.ig_followers&&'IG '+t.ig_followers, t.tiktok_followers&&'TT '+t.tiktok_followers.trim(), t.yt_followers&&'YT '+t.yt_followers, t.twitch_followers&&'Twitch '+t.twitch_followers].filter(Boolean).join(' · ');
    const UDI_KEYS_RENDER = new Set(['udi_3m','udi_6m','udi_1y']);
    // Filter out any legacy UDI actions that may have been stored
    talentActions[t.name] = (talentActions[t.name]||[]).filter(a => !UDI_KEYS_RENDER.has(a.key));
    const actions = talentActions[t.name];

    // UDI package
    const months = udiMonths[t.name] || 0;
    const udiCalc = getUDITotal(t.name, months);
    const udiBlockHTML = `
      <div class="udi-selector-wrap">
        <span class="udi-selector-label">📦 UDI — Uso de Imagen</span>
        <input class="udi-months-input" type="number" min="0" max="24"
          value="${months||''}" placeholder="0"
          oninput="setUDIMonths('${t.name.replace(/'/g,"\'")}', this.value)"
          title="Número de meses">
        <span style="font-size:12px;color:var(--muted);margin-left:-6px;">meses</span>
        <div class="udi-info">${months >= 1 ? `
          <div class="udi-price-line">$${fmtNum(udiCalc.unitPrice)} x ${months} mes${months>1?'es':''}
            ${udiCalc.discount > 0 ? `<span class="udi-discount-badge">-${Math.round(udiCalc.discount*100)}%</span>` : ''}
          </div>
          <div class="udi-total-line">$${fmtNum(udiCalc.total)} MXN</div>
          ${udiCalc.savings > 0 ? `<div class="udi-savings-line">Ahorras $${fmtNum(udiCalc.savings)} MXN</div>` : ''}
        ` : `<div class="udi-price-line" style="color:var(--muted)">Ingresa meses para ver precio</div>`}
        </div>
        ${months >= 1 ? `<button class="udi-remove-btn" onclick="setUDIMonths('${t.name.replace(/'/g,"\'")}', 0)">✕ Quitar</button>` : ''}
      </div>`;

    // Actions discount rows
    const actSub = actions.reduce((s,a) => s+(a.qty||1)*(a.price||0), 0);

    const actionRows = actions.length===0
      ? '<tr><td colspan="5"><div class="empty-state"><div class="icon">◈</div><p>Agrega acciones para este talento</p></div></td></tr>'
      : actions.map((a,i) => {
          const lt=(a.qty||1)*(a.price||0);
          return `<tr>
            <td><span class="action-label">${a.label}</span><span class="platform-tag ${a.platform}">${PLATFORM_LABELS[a.platform]||'General'}</span>${a.surcharge?'<br><span class="collab-note">+15% collab sobre precio base</span>':''}</td>
            <td><input class="qty-input" type="number" min="1" value="${a.qty||1}" onchange="updateAction('${t.name.replace(/'/g,"\'")}',${i},'qty',this.value)"></td>
            <td><input class="price-input ${a.preloaded?'preloaded':''}" type="number" value="${a.price||''}" placeholder="0" onchange="updateAction('${t.name.replace(/'/g,"\'")}',${i},'price',this.value)"></td>
            <td><span class="line-total">$${fmtNum(lt)}</span></td>
            <td><button class="remove-action-btn" onclick="removeAction('${t.name.replace(/'/g,"\'")}',${i})">✕</button></td>
          </tr>`;
        }).join('');

    return `<div class="card">
      <div class="talent-section-header"><span class="t-hname">${t.name}</span><span class="t-hfollowers">${fw}</span></div>
      ${udiBlockHTML}
      <table class="actions-table" style="margin-top:14px"><thead><tr><th>Acción</th><th>Cant.</th><th>Precio Unit.</th><th style="text-align:right">Subtotal</th><th></th></tr></thead>
      <tbody id="actions-body-${slugify(t.name)}">${actionRows}</tbody></table>
      <div class="add-action-row">
        <select id="action-select-${slugify(t.name)}">${buildActionSelect(t.name)}</select>
        <button class="btn btn-ghost btn-sm" onclick="addAction('${t.name.replace(/'/g,"\'")}')">+ Agregar</button>
      </div>
    </div>`;
  }).join('');
}

function addAction(talentName) {
  const sel = document.getElementById('action-select-'+slugify(talentName));
  const key = sel.value; if (!key) return;
  const catalog = ACTION_CATALOG.find(a=>a.key===key); if (!catalog) return;
  const talent = TALENTS.find(t=>t.name===talentName);
  let price=null, preloaded=false;
  if (catalog.surcharge) {
    if (talent.prices['reel']) { price=Math.round(talent.prices['reel']*catalog.surcharge); preloaded=true; }
  } else if (talent.prices[key]!=null) { price=talent.prices[key]; preloaded=true; }
  talentActions[talentName].push({key, label:catalog.label, platform:catalog.platform, qty:1, price, preloaded, surcharge:catalog.surcharge});
  sel.value=''; renderActionsSection(); recalcTotals();
}
function removeAction(talentName, index) {
  talentActions[talentName].splice(index,1); renderActionsSection(); recalcTotals();
}
function setUDIMonths(talentName, val) {
  udiMonths[talentName] = parseInt(val) || 0;
  renderActionsSection();
  recalcTotals();
}
function updateAction(talentName, index, field, value) {
  talentActions[talentName][index][field] = field==='qty'?parseInt(value)||1:parseFloat(value)||0;
  recalcTotals();
  const a=talentActions[talentName][index]; const lt=(a.qty||1)*(a.price||0);
  const tbody=document.getElementById('actions-body-'+slugify(talentName));
  if (tbody) { const rows=tbody.querySelectorAll('tr'); if (rows[index]) { const el=rows[index].querySelector('.line-total'); if (el) el.textContent='$'+fmtNum(lt); } }
}
function recalcTotals() {
  let sub = 0;
  selectedTalents.forEach(t => {
    const actions = talentActions[t.name] || [];
    const actSub = actions.reduce((s,a) => s+(a.qty||1)*(a.price||0), 0);
    const udiCalc = getUDITotal(t.name, udiMonths[t.name] || 0);
    sub += actSub + udiCalc.total;
  });
  const iva=sub*0.16, total=sub+iva;
  document.getElementById('t-subtotal').textContent='$'+fmtNum(sub)+' MXN';
  document.getElementById('t-iva').textContent='$'+fmtNum(iva)+' MXN';
  document.getElementById('t-total').textContent='$'+fmtNum(total)+' MXN';
}
function fmtNum(n) { return Math.round(n).toLocaleString('es-MX'); }
function resetAll() {
  if (!confirm('¿Reiniciar cotización?')) return;
  selectedTalents=[]; talentActions={}; udiMonths={};
  ['client-name','author-name','quote-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('quote-date').value=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
  renderSelectedTalents(); renderActionsSection(); recalcTotals();
}
function generatePDF() {
  const client=document.getElementById('client-name').value||'Cliente';
  const date=document.getElementById('quote-date').value;
  const author=document.getElementById('author-name').value;
  const notes=document.getElementById('quote-notes').value;
  let sub=0;
  selectedTalents.forEach(t => {
    const acts = talentActions[t.name]||[];
    sub += acts.reduce((s,a)=>s+(a.qty||1)*(a.price||0),0);
    sub += getUDITotal(t.name, udiMonths[t.name]||0).total;
  });
  const iva=sub*0.16, total=sub+iva;
  const blocks=selectedTalents.map(t=>{
    const acts=talentActions[t.name]||[];
    const months = udiMonths[t.name]||0;
    const udiCalc = getUDITotal(t.name, months);
    if(!acts.length && !months) return '';
    const fw=[t.ig_followers&&'IG: '+t.ig_followers, t.tiktok_followers&&'TT: '+t.tiktok_followers.trim()].filter(Boolean).join(' · ');
    let actSub=0;
    const actionRows=acts.map(a=>{const ln=(a.qty||1)*(a.price||0);actSub+=ln;
      return `<tr><td>${a.qty||1}</td><td>${a.label}${a.surcharge?'<span class="reel-collab-badge">COLLAB</span>':''}</td><td>$${fmtNum(a.price||0)} MXN</td><td>$${fmtNum(ln)} MXN</td></tr>`;}).join('');
    const udiRow = months >= 1 ? `
      <tr style="background:#fff5f0;">
        <td>${months}</td>
        <td><span style="display:inline-block;font-size:9px;font-weight:900;background:#fe6400;color:white;padding:2px 6px;border-radius:3px;margin-right:6px;">EXCL.</span>UDI — Uso de Imagen${udiCalc.discount>0?` <span style="font-size:10px;background:#e6f7f0;color:#00ad68;border:1px solid #00ad68;padding:1px 5px;border-radius:3px;margin-left:4px;">-${Math.round(udiCalc.discount*100)}% desc.</span>`:''}</td>
        <td style="text-align:right">$${fmtNum(udiCalc.unitPrice)} MXN</td>
        <td style="text-align:right">$${fmtNum(udiCalc.total)} MXN${udiCalc.savings>0?`<br><span style="font-size:10px;color:#00ad68">Ahorras $${fmtNum(udiCalc.savings)}</span>`:''}</td>
      </tr>` : '';
    const talentNet = actSub + udiCalc.total;
    const subtotalRow = `<tr style="background:#fafafa;border-top:2px solid #fe6400"><td colspan="3" style="font-weight:900;color:#fe6400;font-size:12px;text-transform:uppercase;letter-spacing:1px;">Subtotal ${t.name}</td><td style="text-align:right;font-weight:900;color:#fe6400;font-size:14px;">$${fmtNum(talentNet)} MXN</td></tr>`;
    return `<div class="pdf-talent-block"><div class="pdf-talent-header"><span class="t-name">${t.name}</span><span class="t-followers">${fw}</span></div>
      <table class="pdf-actions-table"><thead><tr><th>Cant.</th><th>Acción</th><th>Precio Unit.</th><th>Total</th></tr></thead><tbody>${actionRows}${udiRow}${subtotalRow}</tbody></table></div>`;
  }).join('');
  const noteHTML=notes?`<div class="pdf-note-section"><strong>Notas:</strong> ${notes}</div>`:'';
  const authorHTML=author?`<div style="margin-top:8px"><div class="pdf-label">Elaboró</div><div style="font-size:13px;font-weight:600;color:#555">${author}</div></div>`:'';
  document.getElementById('pdf-content').innerHTML=
    `<div class="pdf-logo-row"><img class="pdf-logo-img" src="${LOGO_PNG}" alt="MOVDI">
    <div class="pdf-meta"><div class="pdf-label">Cliente</div><div class="pdf-value">${client.toUpperCase()}</div>
    <div style="margin-top:8px"><div class="pdf-label">Fecha</div><div style="font-size:14px;font-weight:600;color:#555">${date}</div></div>${authorHTML}</div></div>
    ${noteHTML}${blocks}
    <div class="pdf-total-section">
      <div class="pdf-total-row"><span>Subtotal</span><span>$${fmtNum(sub)} MXN</span></div>
      <div class="pdf-total-row"><span>IVA (16%)</span><span>$${fmtNum(iva)} MXN</span></div>
      <div class="pdf-total-row grand"><span>TOTAL</span><span>$${fmtNum(total)} MXN</span></div></div>
    <div class="pdf-footer"><div><div class="pdf-facturation">Facturación: MOVDI COMUNICACIÓN SA DE CV</div>
    <div style="margin-top:4px">hola@movdi.mx · 5548418158 · @movdimx</div></div>
    <div class="pdf-confidential">Documento propiedad de MOVDI AGENCY. Información CONFIDENCIAL para uso exclusivo del destinatario.</div></div>`;
  document.getElementById('pdf-overlay').classList.add('show');
}
function closePDFOverlay() { document.getElementById('pdf-overlay').classList.remove('show'); }
function downloadPDF() {
  const {jsPDF}=window.jspdf;
  const el=document.getElementById('pdf-content');
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{
    const imgData=canvas.toDataURL('image/png');
    const pdf=new jsPDF('p','mm','a4');
    const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
    const imgH=pw/(canvas.width/canvas.height);
    let yPos=0, remaining=imgH, first=true;
    while(remaining>0){if(!first)pdf.addPage();pdf.addImage(imgData,'PNG',0,-yPos,pw,imgH);yPos+=ph;remaining-=ph;first=false;}
    const client=document.getElementById('client-name').value||'cliente';
    pdf.save('cotizacion-movdi-'+client.toLowerCase().replace(/\s+/g,'-')+'.pdf');
  });
}
document.getElementById('quote-date').value=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
</script>
